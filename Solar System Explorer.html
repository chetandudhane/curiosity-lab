document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"{{ focused }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onclick=\"{{ closePanel }}\" style=\"display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border-radius:999px; border:1px solid rgba(232,205,160,.2); background:rgba(255,255,255,.04); color:#e9d8bf; font-family:'Fredoka',sans-serif; font-weight:500; font-size:13.5px; cursor:pointer; letter-spacing:.2px;\" style-hover=\"{{ backHover }}\">\n        <span style=\"font-size:16px; line-height:1;\">‹<\u002Fspan> Back to the Solar System\n      <\u002Fbutton>\n\n      <div style=\"margin-top:28px; display:flex; align-items:center; gap:16px;\">\n        <div style=\"{{ chipStyle }}\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif; font-weight:600; font-size:34px; color:#f7eedd; line-height:1; letter-spacing:.3px;\">{{ planetName }}<\u002Fdiv>\n          <div style=\"{{ taglineStyle }}\">{{ planetTagline }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:26px 0 0; font-size:17px; line-height:1.68; color:#e7dcca; font-weight:500; text-wrap:pretty;\">{{ planetSummary }}<\u002Fp>\n\n      <div style=\"margin:34px 0 14px; display:flex; align-items:center; gap:12px;\">\n        <div style=\"height:1px; flex:1; background:linear-gradient(90deg, transparent, rgba(232,205,160,.28));\"><\u002Fdiv>\n        <span style=\"font-family:'Fredoka',sans-serif; font-weight:500; font-size:12.5px; letter-spacing:1.4px; text-transform:uppercase; color:rgba(220,196,162,.66);\">Discover More<\u002Fspan>\n        <div style=\"height:1px; flex:1; background:linear-gradient(90deg, rgba(232,205,160,.28), transparent);\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <sc-for list=\"{{ topics }}\" as=\"topic\" hint-placeholder-count=\"3\">\n          <div style=\"{{ topic.itemStyle }}\">\n            <button onclick=\"{{ topic.toggle }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 18px; background:transparent; border:none; cursor:pointer; text-align:left; font-family:'Fredoka',sans-serif; font-weight:500; font-size:16px; color:#f3e8d6;\">\n              <span>{{ topic.title }}<\u002Fspan>\n              <span style=\"{{ topic.iconStyle }}\">+<\u002Fspan>\n            <\u002Fbutton>\n            <div style=\"{{ topic.bodyOuterStyle }}\">\n              <div style=\"overflow:hidden;\">\n                <p style=\"margin:0; padding:2px 18px 18px; font-size:15.5px; line-height:1.62; color:#d7cab6; font-weight:500; text-wrap:pretty;\">{{ topic.body }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = { focusedKey: null, openTopic: null };\n\n  containerRef = React.createRef();\n  mountRef = React.createRef();\n  tooltipRef = React.createRef();\n  panelRef = React.createRef();\n  loadingRef = React.createRef();\n  hintRef = React.createRef();\n\n  PLANETS = [\n    { key:'sun', name:'The Sun', tagline:'Our nearest star', color:'#ff9e35',\n      size:9, orbit:0, speed:0, spin:0.025, tilt:0.12, type:'sun',\n      summary:'The Sun is a giant ball of glowing gas right in the middle of our Solar System. Every planet circles around it. Without the Sun there would be no light, no warmth, and no life on Earth.',\n      topics:[\n        {title:'What is it made of?', body:'Mostly two gases called hydrogen and helium. It is so incredibly hot that nothing solid could ever survive there — no rocks, no ground, just blazing gas.'},\n        {title:'How long is a year here?', body:'The Sun does not orbit anything, so it has no year like the planets do. But it does slowly turn around, taking about 25 Earth days to spin once.'},\n        {title:'Mind-blowing fun fact!', body:'The Sun is so enormous that about one million Earths could fit inside it. And it is the heaviest thing in our whole Solar System!'}\n      ] },\n    { key:'mercury', name:'Mercury', tagline:'The speedy little planet', color:'#9c8a78',\n      size:1.15, orbit:17, speed:1.0, spin:0.45, tilt:0.02, type:'rocky',\n      summary:'Mercury is the smallest planet and the closest one to the Sun. It zooms around the Sun faster than any other planet. In the day it is boiling hot, but at night it turns freezing cold.',\n      topics:[\n        {title:'What is it made of?', body:'Rock and metal, with a huge iron heart in the middle. Its surface is covered in craters, a bit like our Moon.'},\n        {title:'How long is a year here?', body:'A whole year on Mercury is only 88 Earth days. If you lived there, you would have a birthday about every three months!'},\n        {title:'Mind-blowing fun fact!', body:'Even though it sits closest to the Sun, Mercury is NOT the hottest planet. That title belongs to its neighbour, Venus.'}\n      ] },\n    { key:'venus', name:'Venus', tagline:'The hottest planet', color:'#dcab63',\n      size:1.7, orbit:23, speed:0.78, spin:-0.2, tilt:0.05, type:'rocky',\n      summary:'Venus is the hottest planet in the entire Solar System. It is wrapped in thick, poisonous clouds that trap heat like a heavy blanket. It is almost the same size as Earth, so it is sometimes called Earth\\u2019s twin.',\n      topics:[\n        {title:'What is it made of?', body:'A rocky surface with thousands of volcanoes, all hidden under thick swirling clouds of acid.'},\n        {title:'How long is a year here?', body:'A year on Venus is 225 Earth days. The strangest part? One day on Venus is even LONGER than its whole year!'},\n        {title:'Mind-blowing fun fact!', body:'Venus spins backwards! If you stood there, you would watch the Sun rise in the west and set in the east.'}\n      ] },\n    { key:'earth', name:'Earth', tagline:'Our home', color:'#3f7fd0',\n      size:1.8, orbit:30, speed:0.66, spin:0.85, tilt:0.41, type:'earth',\n      summary:'Earth is our home, and the only place we know of that has life. It is covered in oceans of water and wrapped in air we can breathe. From space it looks like a beautiful blue marble.',\n      topics:[\n        {title:'What is it made of?', body:'Rock and metal on the inside, with oceans of liquid water on top and a thin layer of air all around it.'},\n        {title:'How long is a year here?', body:'A year on Earth is 365 days \\u2014 exactly the time it takes to travel all the way around the Sun one time.'},\n        {title:'Mind-blowing fun fact!', body:'Earth is the only planet not named after a Greek or Roman god. And so far, it is the only world we have found with living things on it!'}\n      ] },\n    { key:'mars', name:'Mars', tagline:'The Red Planet', color:'#c1502e',\n      size:1.4, orbit:37.5, speed:0.53, spin:0.82, tilt:0.44, type:'rocky',\n      summary:'Mars is known as the Red Planet because its dusty ground is the colour of rust. It is cold, dry and rocky, with the tallest volcano in the whole Solar System. Scientists send robots there to explore.',\n      topics:[\n        {title:'What is it made of?', body:'Rock and iron-rich dust. That iron is what gives Mars its famous reddish-orange colour, like rusty metal.'},\n        {title:'How long is a year here?', body:'A year on Mars lasts 687 Earth days \\u2014 nearly twice as long as a year on Earth.'},\n        {title:'Mind-blowing fun fact!', body:'Mars is home to Olympus Mons, a giant volcano about three times taller than Mount Everest!'}\n      ] },\n    { key:'jupiter', name:'Jupiter', tagline:'The biggest planet', color:'#cda079',\n      size:4.6, orbit:52, speed:0.29, spin:1.5, tilt:0.05, type:'gas',\n      summary:'Jupiter is the biggest planet of all \\u2014 so huge that every other planet could fit inside it! It is a giant spinning ball of gas with no solid ground at all. It even has a storm bigger than the whole Earth.',\n      topics:[\n        {title:'What is it made of?', body:'Mostly gas \\u2014 hydrogen and helium \\u2014 with no hard surface. A spaceship could never land on it because there is nothing solid to stand on.'},\n        {title:'How long is a year here?', body:'One year on Jupiter lasts about 12 Earth years! It is so far from the Sun that one trip around takes a very long time.'},\n        {title:'Mind-blowing fun fact!', body:'Jupiter\\u2019s Great Red Spot is a giant storm that has been swirling for over 300 years \\u2014 longer than anyone alive has been around!'}\n      ] },\n    { key:'saturn', name:'Saturn', tagline:'The ringed planet', color:'#e0c486',\n      size:3.9, orbit:66, speed:0.22, spin:1.35, tilt:0.47, type:'gas-ring',\n      summary:'Saturn is famous for its beautiful rings, which circle around it like a giant hula hoop. It is a huge ball of gas, and it is so light that it would actually float in water. It has dozens of moons too.',\n      topics:[\n        {title:'What is it made of?', body:'Mostly gas, just like Jupiter. Its sparkling rings are made of billions of pieces of ice and rock, from tiny grains to chunks as big as a house.'},\n        {title:'How long is a year here?', body:'A year on Saturn lasts about 29 Earth years \\u2014 so you would wait a very long time between birthdays!'},\n        {title:'Mind-blowing fun fact!', body:'Saturn\\u2019s rings are super wide but amazingly thin. If you shrank Saturn to the size of a beach ball, the rings would be thinner than a sheet of paper.'}\n      ] },\n    { key:'uranus', name:'Uranus', tagline:'The sideways planet', color:'#a7e0e0',\n      size:2.6, orbit:78, speed:0.16, spin:0.7, tilt:1.71, type:'ice',\n      summary:'Uranus is a cold, icy giant that glows a pale blue-green. The strangest thing about it is that it spins on its side, like a ball rolling along the ground! It is so far away you cannot see it without a telescope.',\n      topics:[\n        {title:'What is it made of?', body:'Icy gases such as water, ammonia and methane. The methane gas is what soaks up red light and gives Uranus its blue-green colour.'},\n        {title:'How long is a year here?', body:'A year on Uranus lasts about 84 Earth years \\u2014 most people would only ever see one Uranus birthday in a whole lifetime!'},\n        {title:'Mind-blowing fun fact!', body:'Because Uranus rolls on its side, each of its seasons lasts about 21 Earth years. Imagine a summer that lasted that long!'}\n      ] },\n    { key:'neptune', name:'Neptune', tagline:'The windy blue giant', color:'#3b62c4',\n      size:2.5, orbit:89, speed:0.13, spin:0.8, tilt:0.49, type:'ice',\n      summary:'Neptune is the farthest planet from the Sun \\u2014 dark, freezing cold and very windy. It is a deep blue ice giant with the fastest winds anywhere in the Solar System. It is so far away that a single trip around the Sun takes ages.',\n      topics:[\n        {title:'What is it made of?', body:'Icy gases, with a deep blue colour that comes from the gas methane high up in its clouds.'},\n        {title:'How long is a year here?', body:'A year on Neptune lasts about 165 Earth years! Since people discovered it, it has only finished one full lap around the Sun.'},\n        {title:'Mind-blowing fun fact!', body:'Neptune has the fastest winds in the Solar System \\u2014 they can blow faster than a racing car at top speed!'}\n      ] }\n  ];\n\n  THREE_URL = 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js';\n  ORBIT_URL = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';\n  BASE_ORBIT = 0.16;\n\n  componentDidMount() {\n    this.disposed = false;\n    this.timeScale = 1;\n    this._tmp = null;\n    this.bodies = [];\n    this.pickables = [];\n    this.bootstrap();\n  }\n\n  componentWillUnmount() {\n    this.disposed = true;\n    if (this.raf) cancelAnimationFrame(this.raf);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    try { if (this.renderer) { this.renderer.dispose(); this.renderer.forceContextLoss && this.renderer.forceContextLoss(); } } catch(e){}\n  }\n\n  setPanelOpen(open) {\n    if (this.panelRef.current) this.panelRef.current.style.transform = open ? 'translateX(0)' : 'translateX(112%)';\n    if (this.hintRef.current) this.hintRef.current.style.opacity = open ? '0' : '1';\n    const tip = this.tooltipRef.current; if (open && tip) tip.style.opacity = '0';\n  }\n\n  loadScript(src) {\n    return new Promise((res, rej) => {\n      if ([...document.scripts].some(s => s.src === src)) return res();\n      const s = document.createElement('script');\n      s.src = src; s.onload = () => res(); s.onerror = () => rej(new Error('Failed: ' + src));\n      document.head.appendChild(s);\n    });\n  }\n\n  async bootstrap() {\n    try {\n      await this.loadScript((window.__resources && window.__resources.three) || this.THREE_URL);\n      await this.loadScript((window.__resources && window.__resources.orbit) || this.ORBIT_URL);\n      if (this.disposed) return;\n      this.initThree();\n      const el = this.loadingRef.current;\n      if (el) { el.style.opacity = '0'; setTimeout(() => { if (el) el.style.display = 'none'; }, 650); }\n    } catch (e) { console.error(e); }\n  }\n\n  // ---------- procedural textures ----------\n  shade(hex, amt) {\n    let h = hex.replace('#',''); if (h.length===3) h = h.split('').map(c=>c+c).join('');\n    let r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);\n    const f = (v) => Math.max(0, Math.min(255, Math.round(amt>=0 ? v+(255-v)*amt : v*(1+amt))));\n    return 'rgb(' + f(r) + ',' + f(g) + ',' + f(b) + ')';\n  }\n  makeTex(w, h, draw) {\n    const c = document.createElement('canvas'); c.width = w; c.height = h;\n    draw(c.getContext('2d'), w, h);\n    const t = new this.T.CanvasTexture(c); t.encoding = this.T.sRGBEncoding; t.anisotropy = 4; t.needsUpdate = true;\n    return t;\n  }\n  rockyTex(base, craters) {\n    return this.makeTex(512, 256, (ctx, w, h) => {\n      ctx.fillStyle = base; ctx.fillRect(0,0,w,h);\n      for (let i=0;i<2200;i++){ const x=Math.random()*w, y=Math.random()*h, r=Math.random()*7+1;\n        ctx.globalAlpha = Math.random()*0.5+0.12; ctx.fillStyle = this.shade(base, (Math.random()-0.5)*0.7);\n        ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }\n      if (craters) for (let i=0;i<60;i++){ const x=Math.random()*w, y=Math.random()*h, r=Math.random()*10+4;\n        ctx.globalAlpha=0.5; ctx.fillStyle=this.shade(base,-0.45); ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();\n        ctx.globalAlpha=0.35; ctx.fillStyle=this.shade(base,0.4); ctx.beginPath(); ctx.arc(x-r*0.25,y-r*0.25,r*0.6,0,7); ctx.fill(); }\n      ctx.globalAlpha=1;\n    });\n  }\n  gasTex(base, spot) {\n    return this.makeTex(512, 256, (ctx, w, h) => {\n      ctx.fillStyle = base; ctx.fillRect(0,0,w,h);\n      let y=0; while (y<h){ const bh = Math.random()*10+5; ctx.fillStyle = this.shade(base,(Math.random()-0.5)*0.45);\n        ctx.globalAlpha = 0.55; ctx.fillRect(0,y,w,bh); y+=bh; }\n      ctx.globalAlpha=0.25;\n      for (let i=0;i<120;i++){ const yy=Math.random()*h; ctx.strokeStyle=this.shade(base,(Math.random()-0.5)*0.6); ctx.lineWidth=Math.random()*3+1;\n        ctx.beginPath(); ctx.moveTo(0,yy); for(let x=0;x<=w;x+=32){ ctx.lineTo(x, yy+Math.sin(x*0.05+i)*3); } ctx.stroke(); }\n      if (spot){ ctx.globalAlpha=0.9; const sx=w*0.7, sy=h*0.62; const g=ctx.createRadialGradient(sx,sy,2,sx,sy,28);\n        g.addColorStop(0,'#e8744a'); g.addColorStop(0.6,'#c8552f'); g.addColorStop(1,'rgba(200,85,47,0)');\n        ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(sx,sy,30,16,0,0,7); ctx.fill(); }\n      ctx.globalAlpha=1;\n    });\n  }\n  earthTex() {\n    return this.makeTex(512, 256, (ctx, w, h) => {\n      const g = ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#1b4f86'); g.addColorStop(0.5,'#236aa6'); g.addColorStop(1,'#1b4f86');\n      ctx.fillStyle = g; ctx.fillRect(0,0,w,h);\n      const land = ['#3f7d3a','#4f8a3e','#6f8f48','#7a6a3e'];\n      for (let i=0;i<26;i++){ const x=Math.random()*w, y=h*0.18+Math.random()*h*0.64; ctx.fillStyle=land[i%land.length]; ctx.globalAlpha=0.9;\n        ctx.beginPath(); const n=8+Math.floor(Math.random()*6); for(let k=0;k<n;k++){ const a=k/n*7; const rr=10+Math.random()*26; ctx.lineTo(x+Math.cos(a)*rr, y+Math.sin(a)*rr*0.7); } ctx.closePath(); ctx.fill(); }\n      ctx.globalAlpha=0.85; ctx.fillStyle='#eef3f6';\n      ctx.fillRect(0,0,w,12); ctx.fillRect(0,h-14,w,14);\n      ctx.globalAlpha=0.18; ctx.fillStyle='#ffffff';\n      for (let i=0;i<40;i++){ const x=Math.random()*w,y=Math.random()*h,r=Math.random()*18+6; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }\n      ctx.globalAlpha=1;\n    });\n  }\n  sunTex() {\n    return this.makeTex(512, 256, (ctx, w, h) => {\n      ctx.fillStyle = '#ff9b2f'; ctx.fillRect(0,0,w,h);\n      for (let i=0;i<1600;i++){ const x=Math.random()*w,y=Math.random()*h,r=Math.random()*9+2;\n        ctx.globalAlpha=Math.random()*0.5+0.2; const c=Math.random(); ctx.fillStyle = c>0.5?this.shade('#ffd36b',Math.random()*0.4):this.shade('#f06a18',Math.random()*0.3);\n        ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }\n      ctx.globalAlpha=1;\n    });\n  }\n  glowTex() {\n    return this.makeTex(256, 256, (ctx, w, h) => {\n      const g = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w/2);\n      g.addColorStop(0,'rgba(255,225,160,0.95)'); g.addColorStop(0.25,'rgba(255,176,80,0.55)');\n      g.addColorStop(0.55,'rgba(255,140,50,0.18)'); g.addColorStop(1,'rgba(255,120,40,0)');\n      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);\n    });\n  }\n  ringTex() {\n    return this.makeTex(512, 8, (ctx, w, h) => {\n      for (let x=0;x<w;x++){ const f=x/w; let a = 0.55+0.35*Math.sin(f*70)+0.1*Math.sin(f*220);\n        if (f<0.06||f>0.97) a=0; if (f>0.46&&f<0.52) a*=0.15; a=Math.max(0,Math.min(1,a));\n        const l=(Math.sin(f*60)*0.18); ctx.fillStyle=this.shade('#e4cda0',l); ctx.globalAlpha=a; ctx.fillRect(x,0,1,h); }\n      ctx.globalAlpha=1;\n    });\n  }\n\n  // ---------- scene ----------\n  initThree() {\n    const T = this.T = window.THREE;\n    const mount = this.mountRef.current;\n    const w = mount.clientWidth, h = mount.clientHeight;\n\n    const scene = this.scene = new T.Scene();\n    const camera = this.camera = new T.PerspectiveCamera(50, w/h, 0.1, 4000);\n    this.homePos = new T.Vector3(0, 62, 132);\n    this.homeTarget = new T.Vector3(0, 0, 0);\n    camera.position.copy(this.homePos);\n\n    const renderer = this.renderer = new T.WebGLRenderer({ antialias:true, alpha:true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));\n    renderer.setSize(w, h);\n    renderer.outputEncoding = T.sRGBEncoding;\n    mount.appendChild(renderer.domElement);\n    renderer.domElement.style.cursor = 'grab';\n\n    const controls = this.controls = new T.OrbitControls(camera, renderer.domElement);\n    controls.enableDamping = true; controls.dampingFactor = 0.06;\n    controls.minDistance = 14; controls.maxDistance = 340;\n    controls.maxPolarAngle = Math.PI * 0.92;\n    controls.target.copy(this.homeTarget);\n    this._tmpTarget = controls.target.clone();\n\n    // lights\n    scene.add(new T.AmbientLight(0x3a4660, 0.32));\n    const sunLight = new T.PointLight(0xfff0d4, 2.4, 0, 0);\n    scene.add(sunLight);\n\n    // starfield\n    const N = 1900; const arr = new Float32Array(N*3); const col = new Float32Array(N*3);\n    const warm = [[1,0.95,0.85],[1,0.85,0.6],[0.8,0.88,1],[1,1,1]];\n    for (let i=0;i<N;i++){ const r=420+Math.random()*1100; const th=Math.random()*Math.PI*2; const ph=Math.acos(2*Math.random()-1);\n      arr[i*3]=r*Math.sin(ph)*Math.cos(th); arr[i*3+1]=r*Math.cos(ph); arr[i*3+2]=r*Math.sin(ph)*Math.sin(th);\n      const c=warm[Math.floor(Math.random()*warm.length)]; const b=0.6+Math.random()*0.4; col[i*3]=c[0]*b; col[i*3+1]=c[1]*b; col[i*3+2]=c[2]*b; }\n    const sg = new T.BufferGeometry();\n    sg.setAttribute('position', new T.BufferAttribute(arr,3));\n    sg.setAttribute('color', new T.BufferAttribute(col,3));\n    scene.add(new T.Points(sg, new T.PointsMaterial({ size:1.5, sizeAttenuation:true, vertexColors:true, transparent:true, opacity:0.9 })));\n\n    // bodies\n    this.PLANETS.forEach(p => {\n      const obj = new T.Object3D(); scene.add(obj);\n      const tilt = new T.Object3D(); tilt.rotation.z = p.tilt; obj.add(tilt);\n\n      let tex;\n      if (p.type==='sun') tex = this.sunTex();\n      else if (p.type==='earth') tex = this.earthTex();\n      else if (p.type==='gas') tex = this.gasTex(p.color, true);\n      else if (p.type==='gas-ring') tex = this.gasTex(p.color, false);\n      else if (p.type==='ice') tex = this.gasTex(p.color, false);\n      else tex = this.rockyTex(p.color, p.key==='mercury'||p.key==='mars');\n\n      const geo = new T.SphereGeometry(p.size, 48, 48);\n      const mat = p.type==='sun'\n        ? new T.MeshBasicMaterial({ map:tex })\n        : new T.MeshStandardMaterial({ map:tex, roughness:0.92, metalness:0.04 });\n      const mesh = new T.Mesh(geo, mat);\n      mesh.userData.key = p.key;\n      tilt.add(mesh);\n      this.pickables.push(mesh);\n\n      if (p.type==='sun') {\n        const glow = new T.Sprite(new T.SpriteMaterial({ map:this.glowTex(), color:0xffffff, transparent:true, blending:T.AdditiveBlending, depthWrite:false }));\n        glow.scale.set(p.size*7, p.size*7, 1); obj.add(glow);\n        const glow2 = new T.Sprite(new T.SpriteMaterial({ map:this.glowTex(), color:0xffcaa0, transparent:true, blending:T.AdditiveBlending, depthWrite:false, opacity:0.6 }));\n        glow2.scale.set(p.size*3.4, p.size*3.4, 1); obj.add(glow2);\n      }\n\n      if (p.type==='gas-ring') {\n        const inner = p.size*1.45, outer = p.size*2.45;\n        const rgeo = new T.RingGeometry(inner, outer, 96, 1);\n        const pos = rgeo.attributes.position, uv = rgeo.attributes.uv;\n        const v = new T.Vector3();\n        for (let i=0;i<pos.count;i++){ v.set(pos.getX(i), pos.getY(i), 0); const d=v.length();\n          uv.setXY(i, (d-inner)/(outer-inner), 0.5); }\n        const ring = new T.Mesh(rgeo, new T.MeshBasicMaterial({ map:this.ringTex(), side:T.DoubleSide, transparent:true, opacity:0.92, depthWrite:false }));\n        ring.rotation.x = -Math.PI/2;\n        tilt.add(ring);\n      }\n\n      // orbit line\n      if (p.orbit > 0) {\n        const pts=[]; for (let a=0;a<=140;a++){ const t=a/140*Math.PI*2; pts.push(new T.Vector3(Math.cos(t)*p.orbit,0,Math.sin(t)*p.orbit)); }\n        const lg = new T.BufferGeometry().setFromPoints(pts);\n        scene.add(new T.LineLoop(lg, new T.LineBasicMaterial({ color:0xc4ad8e, transparent:true, opacity:0.14 })));\n      }\n\n      const b = { p, obj, mesh, angle: Math.random()*Math.PI*2 };\n      obj.position.set(Math.cos(b.angle)*p.orbit, 0, Math.sin(b.angle)*p.orbit);\n      this.bodies.push(b);\n      if (p.key==='sun') this.sunBody = b;\n    });\n\n    // interaction\n    this.ray = new T.Raycaster();\n    this.ndc = new T.Vector2();\n    const dom = renderer.domElement;\n    dom.addEventListener('pointermove', this.onMove);\n    dom.addEventListener('pointerdown', this.onDown);\n    dom.addEventListener('pointerup', this.onUp);\n\n    this._onResize = () => {\n      const W = mount.clientWidth, H = mount.clientHeight;\n      camera.aspect = W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);\n    };\n    window.addEventListener('resize', this._onResize);\n\n    this.clock = new T.Clock();\n    this.focus = null;\n    this.returning = false;\n    this.animate();\n  }\n\n  pick(e) {\n    const rect = this.renderer.domElement.getBoundingClientRect();\n    this.ndc.x = ((e.clientX-rect.left)/rect.width)*2 - 1;\n    this.ndc.y = -((e.clientY-rect.top)/rect.height)*2 + 1;\n    this.ray.setFromCamera(this.ndc, this.camera);\n    const hit = this.ray.intersectObjects(this.pickables, false);\n    return hit.length ? hit[0].object.userData.key : null;\n  }\n\n  onMove = (e) => {\n    const rect = this.renderer.domElement.getBoundingClientRect();\n    if (this._down) { const dx=e.clientX-this._down.x, dy=e.clientY-this._down.y; if (dx*dx+dy*dy>30) this._down.moved=true; }\n    const key = this.pick(e);\n    const tip = this.tooltipRef.current;\n    if (key) {\n      this.renderer.domElement.style.cursor = 'pointer';\n      const p = this.PLANETS.find(d=>d.key===key);\n      if (tip){ tip.textContent = p.name; tip.style.left = (e.clientX-rect.left)+'px'; tip.style.top = (e.clientY-rect.top)+'px'; tip.style.opacity='1'; }\n    } else {\n      this.renderer.domElement.style.cursor = this._down ? 'grabbing' : 'grab';\n      if (tip) tip.style.opacity='0';\n    }\n  };\n  onDown = (e) => { this._down = { x:e.clientX, y:e.clientY, moved:false }; };\n  onUp = (e) => {\n    const d = this._down; this._down = null;\n    this.renderer.domElement.style.cursor = 'grab';\n    if (!d || d.moved) return;\n    const key = this.pick(e);\n    if (key) this.selectPlanet(key);\n  };\n\n  selectPlanet(key) {\n    const b = this.bodies.find(x=>x.p.key===key); if (!b) return;\n    const T = this.T;\n    const dist = b.p.size*3.6 + 8;\n    const offset = new T.Vector3(0.55, 0.42, 1).normalize().multiplyScalar(dist);\n    this._tmpTarget.copy(this.controls.target);\n    this.focus = { body:b, offset, phase:'in', prev:new T.Vector3() };\n    this.returning = false;\n    this.setState({ focusedKey: key, openTopic: null });\n    this.setPanelOpen(true);\n  }\n\n  closePanel = () => {\n    if (!this.T) return;\n    this._tmpTarget.copy(this.controls.target);\n    this.focus = null;\n    this.returning = true;\n    this.setState({ focusedKey: null, openTopic: null });\n    this.setPanelOpen(false);\n  };\n\n  animate = () => {\n    if (this.disposed) return;\n    this.raf = requestAnimationFrame(this.animate);\n    const T = this.T;\n    const dt = Math.min(this.clock.getDelta(), 0.05);\n\n    const target = this.focus ? 0.07 : 1;\n    this.timeScale += (target - this.timeScale) * Math.min(1, dt*3);\n\n    this.bodies.forEach(b => {\n      if (b.p.orbit > 0) {\n        b.angle += this.BASE_ORBIT * b.p.speed * this.timeScale * dt;\n        b.obj.position.set(Math.cos(b.angle)*b.p.orbit, 0, Math.sin(b.angle)*b.p.orbit);\n      }\n      b.mesh.rotation.y += b.p.spin * dt * (0.4 + 0.6*this.timeScale);\n    });\n\n    const cam = this.camera, ctr = this.controls;\n    if (this.focus) {\n      const tgt = this.focus.body.obj.position;\n      if (this.focus.phase === 'in') {\n        ctr.enabled = false;\n        const dest = tgt.clone().add(this.focus.offset);\n        cam.position.lerp(dest, 0.08);\n        this._tmpTarget.lerp(tgt, 0.12); ctr.target.copy(this._tmpTarget);\n        cam.lookAt(this._tmpTarget);\n        if (cam.position.distanceTo(dest) < 0.8) { this.focus.phase = 'locked'; this.focus.prev.copy(tgt); ctr.enabled = true; }\n      } else {\n        const drift = tgt.clone().sub(this.focus.prev);\n        cam.position.add(drift); ctr.target.add(drift); this.focus.prev.copy(tgt);\n        ctr.update();\n      }\n    } else if (this.returning) {\n      ctr.enabled = false;\n      cam.position.lerp(this.homePos, 0.06);\n      this._tmpTarget.lerp(this.homeTarget, 0.08); ctr.target.copy(this._tmpTarget);\n      cam.lookAt(this._tmpTarget);\n      if (cam.position.distanceTo(this.homePos) < 1.2) { this.returning = false; ctr.enabled = true; }\n    } else {\n      ctr.update();\n    }\n\n    this.renderer.render(this.scene, cam);\n  };\n\n  renderVals() {\n    const p = this.PLANETS.find(d => d.key === this.state.focusedKey);\n    const topics = p ? p.topics.map((t, i) => {\n      const open = this.state.openTopic === i;\n      return {\n        title: t.title, body: t.body, open,\n        itemStyle: { borderRadius:'15px', overflow:'hidden', border:'1px solid ' + (open ? 'rgba(255,200,130,.3)' : 'rgba(232,205,160,.13)'), background: open ? 'rgba(255,200,130,.06)' : 'rgba(255,255,255,.03)', transition:'border-color .25s, background .25s' },\n        iconStyle: { fontFamily:\"'Fredoka',sans-serif\", fontWeight:400, fontSize:'22px', lineHeight:1, color: open ? '#ffce82' : 'rgba(228,208,178,.7)', transform: open ? 'rotate(45deg)' : 'rotate(0deg)', transition:'transform .3s ease, color .25s' },\n        bodyOuterStyle: { maxHeight: open ? '400px' : '0px', overflow:'hidden', opacity: open ? 1 : 0, transition: open ? 'max-height .42s ease, opacity .3s ease .08s' : 'max-height .32s ease, opacity .2s ease' },\n        toggle: () => this.setState(s => ({ openTopic: s.openTopic === i ? null : i }))\n      };\n    }) : [];\n\n    return {\n      containerRef: this.containerRef,\n      mountRef: this.mountRef,\n      tooltipRef: this.tooltipRef,\n      panelRef: this.panelRef,\n      loadingRef: this.loadingRef,\n      hintRef: this.hintRef,\n      focused: !!p,\n      planetName: p ? p.name : '',\n      planetTagline: p ? p.tagline : '',\n      planetSummary: p ? p.summary : '',\n      chipStyle: { width:'48px', height:'48px', borderRadius:'50%', flex:'none', background: p ? 'radial-gradient(circle at 34% 30%, ' + this.shade(p.color,0.35) + ', ' + p.color + ' 68%, ' + this.shade(p.color,-0.35) + ')' : '#888', boxShadow: p ? '0 0 22px ' + p.color + '88, inset -3px -3px 8px rgba(0,0,0,.4)' : 'none' },\n      taglineStyle: { fontFamily:\"'Nunito',sans-serif\", fontWeight:700, fontSize:'13px', letterSpacing:'1.2px', textTransform:'uppercase', color: p ? this.shade(p.color, 0.3) : '#aaa', marginTop:'7px' },\n      backHover: { background:'rgba(255,255,255,.09)', borderColor:'rgba(232,205,160,.4)' },\n      topics,\n      closePanel: this.closePanel\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
